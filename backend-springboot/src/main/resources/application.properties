spring.application.name=platform
server.port=8080

# App version
app.version=1.0.0

# ============= 启动优化 =============
# 延迟初始化：非核心 Bean 在首次使用时才创建，大幅减少启动时间
spring.main.lazy-initialization=true

# MySQL Database configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:intelligence_platform}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}

# HikariCP 连接池配置（MySQL）
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=PlatformHikariPool

# Schema auto-initialization（启动时自动建表，IF NOT EXISTS 确保幂等）
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema-v2.sql
spring.sql.init.continue-on-error=true

# MyBatis-Plus configuration
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# File upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
# 注意：此处使用相对路径，在 Tauri sidecar 中会通过 -D 参数覆盖为绝对路径
upload.dir=./uploads

# 服务器线程池配置（高并发）
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=20
server.tomcat.accept-count=100
server.tomcat.max-connections=10000

# HTTP 压缩（提升传输效率）
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=2048

# ============================================================
# LLM 配置（从 .env 文件加载）
# 当前启用平台由 LLM_PROVIDER 指定（默认：siliconflow）
# ============================================================

# 主 Chat LLM（问答使用）
llm.default.api-key=${LLM_API_KEY:}
llm.default.base-url=${LLM_API_BASE_URL:https://api.siliconflow.cn/v1}
llm.default.model=${LLM_MODEL:Qwen/Qwen2.5-72B-Instruct}
llm.default.provider=${LLM_PROVIDER:siliconflow}

# 词条抽取专用 LLM（Extract LLM）
llm.extract.api-key=${EXTRACT_LLM_API_KEY:${LLM_API_KEY:}}
llm.extract.base-url=${EXTRACT_LLM_BASE_URL:${LLM_API_BASE_URL:https://api.siliconflow.cn/v1}}
llm.extract.model=${EXTRACT_LLM_MODEL:${LLM_MODEL:Qwen/Qwen2.5-72B-Instruct}}
llm.extract.provider=${EXTRACT_LLM_PROVIDER:${LLM_PROVIDER:siliconflow}}

# 视觉语言模型 VLM（图片处理 / OCR）
llm.vlm.api-key=${VLM_API_KEY:${LLM_API_KEY:}}
llm.vlm.base-url=${VLM_API_BASE_URL:${LLM_API_BASE_URL:https://api.siliconflow.cn/v1}}
llm.vlm.model=${VLM_MODEL:Qwen/Qwen2.5-VL-72B-Instruct}
llm.vlm.provider=${VLM_PROVIDER:${LLM_PROVIDER:siliconflow}}

# Embedding 模型（转向量数据库）
embedding.default.api-key=${EMBEDDING_API_KEY:${LLM_API_KEY:}}
embedding.default.base-url=${EMBEDDING_API_BASE_URL:https://api.siliconflow.cn/v1}
embedding.default.model=${EMBEDDING_MODEL:BAAI/bge-large-zh-v1.5}
embedding.default.provider=${EMBEDDING_PROVIDER:siliconflow}

# Rerank 模型（检索重排序）
rerank.default.api-key=${RERANK_API_KEY:${LLM_API_KEY:}}
rerank.default.base-url=${RERANK_API_BASE_URL:https://api.siliconflow.cn/v1}
rerank.default.model=${RERANK_MODEL:BAAI/bge-reranker-v2-m3}
rerank.default.provider=${RERANK_PROVIDER:siliconflow}

# 日志配置
logging.file.name=${user.home}/.pku-platform/logs/app.log
logging.file.max-size=10MB
logging.file.max-history=7
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.root=INFO
logging.level.com.intel=DEBUG

# Python parser-service 地址（PaddleOCR-VL 本地表格 OCR 后备）
parser.service.url=${PARSER_SERVICE_URL:http://localhost:8100}

# 优雅关闭配置
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=10s
