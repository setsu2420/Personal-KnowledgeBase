name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.2.0)'
        required: true

jobs:
  # ============================================================
  # macOS Build (aarch64 + x86_64)
  # ============================================================
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          cd frontend-vue && npm ci
          cargo install tauri-cli --version "^2"

      - name: Build backend JAR
        run: |
          cd backend-springboot
          chmod +x mvnw
          ./mvnw package -DskipTests -q
          mkdir -p ../src-tauri/binaries
          cp target/backend.jar ../src-tauri/binaries/backend.jar

      - name: Build Tauri (macOS)
        run: |
          npx --prefix frontend-vue tauri build --target ${{ matrix.target }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  # ============================================================
  # Windows Build (x86_64)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          cd frontend-vue && npm ci
          cargo install tauri-cli --version "^2"

      - name: Build backend JAR
        run: |
          cd backend-springboot
          .\mvnw.cmd package -DskipTests -q
          mkdir -p ..\src-tauri\binaries
          copy target\backend.jar ..\src-tauri\binaries\backend.jar

      - name: Build Tauri (Windows)
        run: |
          npx --prefix frontend-vue tauri build --target x86_64-pc-windows-msvc

      - name: Upload MSI/EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  # ============================================================
  # Linux Build (x86_64)
  # ============================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install dependencies
        run: |
          cd frontend-vue && npm ci
          cargo install tauri-cli --version "^2"

      - name: Build backend JAR
        run: |
          cd backend-springboot
          chmod +x mvnw
          ./mvnw package -DskipTests -q
          mkdir -p ../src-tauri/binaries
          cp target/backend.jar ../src-tauri/binaries/backend.jar

      - name: Build Tauri (Linux)
        run: |
          npx --prefix frontend-vue tauri build --target x86_64-unknown-linux-gnu

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage*

  # ============================================================
  # Create GitHub Release with all artifacts
  # ============================================================
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
